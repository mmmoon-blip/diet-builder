server:
  port: 8080

spring:
  application:
    name: diet-butler-server

  # Redis 配置（用于AI对话Session存储）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5000ms

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:diet_butler}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:diet-butler-secret-key-32-chars-minimum-for-hs256-algorithm}
  expire-days: ${JWT_EXPIRE_DAYS:7}

# 微信小程序配置
wechat:
  appid: wxdd5f7da37e03f697
  secret: e8b4650bf6c2d5e3894dc7aeb69aea2c

# LLM API 配置（支持 OpenAI Compatible APIs，如 Groq、Local LLM 等）
llm:
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.minimax.chat/v1/chat/completions}
  model: ${LLM_MODEL:MiniMax-M2.7}

# 减肥管家配置
diet:
  butler:
    name: 减减
    greeting: "早安呀～我是减减，你的专属减肥小管家！有什么想和我分享的吗？😊"